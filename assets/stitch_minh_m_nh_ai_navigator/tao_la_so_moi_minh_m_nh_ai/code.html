<!DOCTYPE html>

<html class="dark" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Minh Mệnh AI - Tạo lá số mới</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-on-surface": "#343026",
                        "inverse-surface": "#e9e2d3",
                        "on-primary": "#3c2f00",
                        "on-error-container": "#ffdad6",
                        "primary": "#f2ca50",
                        "secondary-fixed-dim": "#ffb4ac",
                        "primary-fixed": "#ffe088",
                        "on-primary-container": "#554300",
                        "primary-fixed-dim": "#e9c349",
                        "on-secondary-container": "#ff9f95",
                        "outline-variant": "#4d4635",
                        "surface-container-low": "#1e1b13",
                        "on-secondary-fixed-variant": "#92030f",
                        "outline": "#99907c",
                        "on-background": "#e9e2d3",
                        "on-tertiary-fixed": "#002111",
                        "error": "#ffb4ab",
                        "on-surface": "#e9e2d3",
                        "surface-dim": "#16130b",
                        "error-container": "#93000a",
                        "surface-container-lowest": "#110e06",
                        "background": "#16130b",
                        "on-tertiary-fixed-variant": "#005232",
                        "tertiary": "#62e6a2",
                        "on-tertiary-container": "#005030",
                        "on-secondary": "#690007",
                        "on-surface-variant": "#d0c5af",
                        "surface-tint": "#e9c349",
                        "primary-container": "#d4af37",
                        "on-primary-fixed": "#241a00",
                        "tertiary-fixed-dim": "#59de9b",
                        "tertiary-fixed": "#78fbb6",
                        "secondary": "#ffb4ac",
                        "surface-container-highest": "#38342b",
                        "secondary-fixed": "#ffdad6",
                        "surface": "#16130b",
                        "on-primary-fixed-variant": "#574500",
                        "secondary-container": "#960711",
                        "surface-container-high": "#2d2a20",
                        "on-secondary-fixed": "#410003",
                        "surface-container": "#221f16",
                        "on-tertiary": "#003921",
                        "surface-variant": "#38342b",
                        "inverse-primary": "#735c00",
                        "on-error": "#690005",
                        "tertiary-container": "#41c989",
                        "surface-bright": "#3d392f"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "unit": "8px",
                        "container-padding-mobile": "20px",
                        "container-padding-desktop": "40px",
                        "section-gap": "32px"
                    },
                    "fontFamily": {
                        "body-lg": ["Manrope"],
                        "headline-lg": ["EB Garamond"],
                        "body-md": ["Manrope"],
                        "headline-md": ["EB Garamond"],
                        "headline-xl": ["EB Garamond"],
                        "headline-lg-mobile": ["EB Garamond"],
                        "body-sm": ["Manrope"],
                        "label-md": ["Manrope"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "500" }],
                        "headline-xl": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "500" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Custom styles for parchment-like background and glassmorphism */
        body {
            background-color: theme('colors.background');
            background-image: radial-gradient(circle at 50% 0%, theme('colors.surface-container-high') 0%, transparent 70%);
        }
        
        .glass-card {
            background: theme('colors.surface/80');
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 0.5px solid theme('colors.primary/20');
        }
        
        .glass-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid theme('colors.outline');
            transition: border-color 0.3s ease;
        }
        
        .glass-input:focus {
            outline: none;
            border-bottom-color: theme('colors.primary');
            box-shadow: 0 1px 0 0 theme('colors.primary');
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface antialiased min-h-screen pb-24 md:pb-0">
<!-- Top App Bar -->
<header class="bg-surface/80 dark:bg-surface/80 backdrop-blur-xl border-b border-primary/20 fixed top-0 w-full z-50 transition-all duration-300">
<div class="flex justify-between items-center w-full px-container-padding-mobile md:px-container-padding-desktop py-unit h-16">
<button class="text-on-surface-variant hover:text-primary transition-colors duration-300 hover:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-lg text-headline-lg tracking-tight text-primary dark:text-primary-fixed">
                Minh Mệnh AI
            </h1>
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center border border-primary/20 overflow-hidden cursor-pointer hover:scale-95 duration-200 transition-transform">
<span class="material-symbols-outlined text-primary" data-icon="person">person</span>
</div>
</div>
</header>
<!-- Main Content -->
<main class="pt-24 px-container-padding-mobile md:px-container-padding-desktop max-w-4xl mx-auto flex flex-col gap-section-gap relative z-10">
<div class="text-center mb-4">
<h2 class="font-headline-xl text-headline-xl text-primary mb-2">Tạo Lá Số Mới</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Khởi tạo hành trình khám phá vận mệnh qua lăng kính uyên bác.</p>
</div>
<form class="glass-card rounded-xl p-6 md:p-10 shadow-[0_0_24px_rgba(0,0,0,0.15)] flex flex-col gap-8 relative overflow-hidden">
<!-- Decorative watermark -->
<div class="absolute -top-20 -right-20 opacity-5 pointer-events-none">
<span class="material-symbols-outlined" data-icon="auto_awesome" style="font-size: 300px;">auto_awesome</span>
</div>
<!-- Section: Thông tin cơ bản -->
<div class="space-y-6">
<h3 class="font-headline-md text-headline-md text-primary-fixed border-b border-primary/20 pb-2 inline-block">Thông Tin Cơ Bản</h3>
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<!-- Họ tên -->
<div class="flex flex-col">
<label class="font-label-md text-label-md text-on-surface-variant mb-1 uppercase tracking-widest" for="fullName">Họ và Tên</label>
<input class="glass-input font-body-lg text-body-lg text-on-surface py-2" id="fullName" placeholder="Nhập họ và tên đầy đủ..." type="text"/>
</div>
<!-- Giới tính -->
<div class="flex flex-col">
<label class="font-label-md text-label-md text-on-surface-variant mb-3 uppercase tracking-widest">Giới Tính</label>
<div class="flex gap-4">
<label class="flex items-center cursor-pointer group">
<input checked="" class="hidden peer" name="gender" type="radio" value="male"/>
<div class="w-5 h-5 rounded-full border-2 border-outline peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center mr-2 transition-colors">
<div class="w-2 h-2 rounded-full bg-surface hidden peer-checked:block"></div>
</div>
<span class="font-body-md text-body-md text-on-surface group-hover:text-primary transition-colors">Nam</span>
</label>
<label class="flex items-center cursor-pointer group">
<input class="hidden peer" name="gender" type="radio" value="female"/>
<div class="w-5 h-5 rounded-full border-2 border-outline peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center mr-2 transition-colors">
<div class="w-2 h-2 rounded-full bg-surface hidden peer-checked:block"></div>
</div>
<span class="font-body-md text-body-md text-on-surface group-hover:text-primary transition-colors">Nữ</span>
</label>
<label class="flex items-center cursor-pointer group">
<input class="hidden peer" name="gender" type="radio" value="other"/>
<div class="w-5 h-5 rounded-full border-2 border-outline peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center mr-2 transition-colors">
<div class="w-2 h-2 rounded-full bg-surface hidden peer-checked:block"></div>
</div>
<span class="font-body-md text-body-md text-on-surface group-hover:text-primary transition-colors">Khác</span>
</label>
</div>
</div>
</div>
</div>
<!-- Section: Thời gian sinh -->
<div class="space-y-6">
<div class="flex justify-between items-end border-b border-primary/20 pb-2">
<h3 class="font-headline-md text-headline-md text-primary-fixed inline-block">Thời Gian Sinh</h3>
<!-- Lịch Toggle -->
<div class="flex bg-surface-container-high rounded-lg p-1 border border-outline-variant">
<button class="px-4 py-1 rounded-md font-label-md text-label-md bg-primary-container/20 text-primary transition-colors" type="button">Dương Lịch</button>
<button class="px-4 py-1 rounded-md font-label-md text-label-md text-on-surface-variant hover:text-on-surface transition-colors" type="button">Âm Lịch</button>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<!-- Ngày sinh -->
<div class="flex flex-col">
<label class="font-label-md text-label-md text-on-surface-variant mb-1 uppercase tracking-widest" for="birthDate">Ngày Sinh</label>
<div class="relative">
<input class="glass-input font-body-lg text-body-lg text-on-surface py-2 w-full bg-transparent color-scheme-dark" id="birthDate" type="date"/>
</div>
</div>
<!-- Giờ sinh -->
<div class="flex flex-col">
<div class="flex justify-between mb-1">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest" for="birthTime">Giờ Sinh</label>
<span class="font-label-md text-label-md text-primary cursor-pointer hover:underline">Chọn theo 12 Chi</span>
</div>
<input class="glass-input font-body-lg text-body-lg text-on-surface py-2 w-full bg-transparent color-scheme-dark" id="birthTime" type="time"/>
</div>
</div>
</div>
<!-- Section: Nơi sinh & Quan tâm -->
<div class="space-y-6">
<h3 class="font-headline-md text-headline-md text-primary-fixed border-b border-primary/20 pb-2 inline-block">Bối Cảnh &amp; Định Hướng</h3>
<div class="grid grid-cols-1 gap-8">
<!-- Nơi sinh -->
<div class="flex flex-col">
<label class="font-label-md text-label-md text-on-surface-variant mb-1 uppercase tracking-widest" for="birthPlace">Nơi Sinh (Tỉnh/Thành phố)</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-0 top-3 text-on-surface-variant" data-icon="location_on">location_on</span>
<input class="glass-input font-body-lg text-body-lg text-on-surface py-2 pl-8 w-full" id="birthPlace" placeholder="VD: Hà Nội, TP.HCM..." type="text"/>
</div>
</div>
<!-- Mối quan tâm -->
<div class="flex flex-col">
<label class="font-label-md text-label-md text-on-surface-variant mb-3 uppercase tracking-widest">Mối Quan Tâm Chính</label>
<div class="flex flex-wrap gap-3">
<button class="px-4 py-2 rounded-full border border-primary text-primary bg-primary/10 font-body-sm text-body-sm hover:bg-primary/20 transition-colors" type="button">Công Việc &amp; Sự Nghiệp</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant hover:border-primary/50 hover:text-on-surface transition-colors font-body-sm text-body-sm" type="button">Tình Cảm &amp; Gia Đạo</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant hover:border-primary/50 hover:text-on-surface transition-colors font-body-sm text-body-sm" type="button">Tài Chính &amp; Tài Lộc</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant hover:border-primary/50 hover:text-on-surface transition-colors font-body-sm text-body-sm" type="button">Sức Khỏe</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant hover:border-primary/50 hover:text-on-surface transition-colors font-body-sm text-body-sm flex items-center gap-1" type="button">
<span class="material-symbols-outlined text-[16px]" data-icon="add">add</span> Khác
                            </button>
</div>
</div>
</div>
</div>
<!-- Nút Hành Động -->
<div class="pt-6 flex justify-center">
<button class="bg-secondary-container hover:bg-secondary-container/90 text-on-secondary px-10 py-4 rounded-xl font-headline-md text-headline-md shadow-[0_0_15px_rgba(150,7,17,0.3)] hover:shadow-[0_0_25px_rgba(150,7,17,0.5)] transition-all duration-300 flex items-center gap-3 transform hover:-translate-y-1" type="button">
<span class="material-symbols-outlined" data-icon="magic_button">magic_button</span>
                    Lập Lá Số
                </button>
</div>
</form>
</main>
<!-- Bottom Nav Bar (Mobile Only) -->
<!-- Suppressed based on semantic rules: This is a task-focused creation screen -->
</body></html>
